name: Docker Publish

on:
  push:
    paths:
      - 'Dockerfile.*'
      - '.github/workflows/**'
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0' # Todo domingo às 03:00 UTC

env:
  IMAGE_NAME: cateim/cups

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Build 1: Ubuntu (será o 'latest')
          - os: ubuntu
            dockerfile: Dockerfile.ubuntu
            base_image: ubuntu:rolling

          # Build 2: Debian
          - os: debian
            dockerfile: Dockerfile.debian
            base_image: debian:trixie-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Descobre a versão real do CUPS direto no repositório
        id: get_version
        run: |
          # Inicia um container rápido da base escolhida e recorta o número exato da versão do pacote
          VERSION=$(docker run --rm ${{ matrix.base_image }} sh -c "apt-get update -qq >/dev/null && apt-cache show cups | grep -m1 '^Version:' | awk '{print \$2}' | sed 's/^[0-9]://' | cut -d'-' -f1")
          echo "CUPS_VERSION=$VERSION" >> $GITHUB_ENV
          echo "A versão mais recente na base ${{ matrix.os }} é: $VERSION"

      - name: Verifica se o build é necessário
        id: check_needed
        run: |
          # Em push/workflow_dispatch, sempre reconstrói. No schedule, verifica se a versão mudou.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "BUILD_NEEDED=true" >> $GITHUB_OUTPUT
            echo "Evento '${{ github.event_name }}': build forçado."
            exit 0
          fi

          # Consulta o Docker Hub para ver se a tag "<versão>-<os>" já existe
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${{ env.CUPS_VERSION }}-${{ matrix.os }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "BUILD_NEEDED=false" >> $GITHUB_OUTPUT
            echo "Versão ${{ env.CUPS_VERSION }}-${{ matrix.os }} já publicada. Pulando build."
          else
            echo "BUILD_NEEDED=true" >> $GITHUB_OUTPUT
            echo "Versão ${{ env.CUPS_VERSION }}-${{ matrix.os }} não encontrada. Build necessário."
          fi

      - name: Gera as tags dinamicamente
        id: meta
        if: steps.check_needed.outputs.BUILD_NEEDED == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ matrix.os == 'ubuntu' }}
            type=raw,value=${{ env.CUPS_VERSION }}-${{ matrix.os }}

      - name: Build and push ${{ matrix.os }}
        if: steps.check_needed.outputs.BUILD_NEEDED == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64, linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.os }}
          cache-to: type=gha,scope=${{ matrix.os }},mode=max